<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AdBlock & Brave Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .status {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .loading { background-color: #ffeeba; color: #856404; }
        .detected { background-color: #f8d7da; color: #721c24; }
        .not-detected { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>AdBlock / Brave Detector</h2>
    <p>Checking browser protections...</p>
    
    <div id="status-box" class="status loading">
        Analyzing network behavior...
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async function() {
        const statusBox = document.getElementById('status-box');
        
        // Strategy: Attempt to fetch a URL that Brave's blocklists absolutely despise.
        // Google DoubleClick or pagead2 are perfect targets.
        const targetUrl = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js';
        
        let isBlocked = false;

        try {
            // We use 'no-cors' so the browser doesn't block it for security reasons,
            // we ONLY care if the adblocker kills the network request.
            const response = await fetch(new Request(targetUrl, { method: 'HEAD', mode: 'no-cors' }));
        } catch (error) {
            // If the fetch fails completely, Brave or an adblocker intercepted it!
            isBlocked = true;
        }

        // Update UI
        if (isBlocked) {
            statusBox.textContent = "AdBlock/Brave Shields Active! 🚫";
            statusBox.className = "status detected";
        } else {
            statusBox.textContent = "No AdBlock Detected. ✅";
            statusBox.className = "status not-detected";
        }
    });
</script>

</body>
</html>
